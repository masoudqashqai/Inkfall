<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>INKFALL — a hallucination of Sin City</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { height: 100%; overflow: hidden; background: #000; font-family: "Courier New", monospace; }
  #c { position: fixed; inset: 0; display: block; touch-action: none; }

  /* caption box — comic-panel narration */
  #caption {
    position: fixed; left: 50%; bottom: max(22px, env(safe-area-inset-bottom)); transform: translateX(-50%);
    z-index: 10; width: min(92vw, 620px);
    background: rgba(245,242,232,0.92); color: #111;
    border: 2px solid #000; box-shadow: 6px 6px 0 rgba(0,0,0,0.6);
    padding: 12px 16px; font-size: clamp(13px, 4vw, 18px); line-height: 1.45;
    letter-spacing: 0.02em; transform-origin: center; transition: opacity 0.4s ease;
  }
  #caption b { color: #c20012; }
  #tapnote { position: fixed; left: 50%; bottom: 4px; transform: translateX(-50%); z-index: 10;
             color: #6a6a6a; font-size: 10px; letter-spacing: 0.25em; }

  /* intro */
  #intro {
    position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 24px;
    background: radial-gradient(circle at 50% 38%, #161616 0%, #000 72%); transition: opacity 0.8s ease;
  }
  #intro h1 { color: #fff; font-size: clamp(46px, 15vw, 130px); letter-spacing: 0.06em; font-weight: 900;
              transform: skewX(-7deg); text-shadow: 0 0 30px rgba(255,255,255,0.22); }
  #intro h1 .b { color: #e10010; text-shadow: 0 0 34px rgba(225,0,16,0.75); }
  #intro p { color: #9a9a9a; margin-top: 14px; font-size: clamp(11px, 3.4vw, 15px); letter-spacing: 0.22em; }
  #intro .sub { color: #5a5a5a; margin-top: 8px; font-size: clamp(10px, 2.7vw, 12px); letter-spacing: 0.1em;
                max-width: 460px; line-height: 1.7; }
  #enter { margin-top: 36px; padding: 15px 38px; cursor: pointer; background: transparent; color: #fff;
           border: 1px solid #fff; font-family: inherit; font-size: 15px; letter-spacing: 0.3em; font-weight: 700;
           transition: all 0.2s ease; }
  #enter:hover, #enter:active { background: #e10010; border-color: #e10010; box-shadow: 0 0 30px rgba(225,0,16,0.6); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="caption" style="display:none"></div>
<div id="tapnote" style="display:none">TAP — NEXT LINE&nbsp; ·&nbsp; DRAG — LOOK&nbsp; ·&nbsp; HOLD — LIGHTNING</div>

<div id="intro">
  <h1>INK<span class="b">FALL</span></h1>
  <p>A HALLUCINATION OF SIN CITY</p>
  <div class="sub">It always rains in Basin City. The whole town is black and white — except the things that bleed.</div>
  <button id="enter">ENTER THE CITY</button>
</div>

<script>
"use strict";
const cv = document.getElementById('c');
const ctx = cv.getContext('2d', { alpha: false });
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.floor(W * DPR); cv.height = Math.floor(H * DPR);
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildCity();
}
addEventListener('resize', resize);

// ---- seeded rng so the skyline is the same town every time ----
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}

// ---------------------------------------------------------------------------
// City skyline — 3 parallax layers of black buildings with lit windows
// ---------------------------------------------------------------------------
let layers = [];
function buildCity() {
  const rng = mulberry32(20051993);
  layers = [];
  const groundY = H * 0.80;
  const layerCfg = [
    { depth: 0.25, top: H * 0.18, shade: '#0c0e13', minW: 60, maxW: 130, minH: 0.34, maxH: 0.62, win: 0.10 }, // far
    { depth: 0.55, top: H * 0.28, shade: '#070809', minW: 80, maxW: 170, minH: 0.40, maxH: 0.74, win: 0.16 }, // mid
    { depth: 1.00, top: H * 0.40, shade: '#020203', minW: 110, maxW: 240, minH: 0.46, maxH: 0.92, win: 0.22 }, // near
  ];
  for (const cfg of layerCfg) {
    const blds = [];
    let x = -120;
    while (x < W + 200) {
      const w = cfg.minW + rng() * (cfg.maxW - cfg.minW);
      const h = (cfg.minH + rng() * (cfg.maxH - cfg.minH)) * (groundY - cfg.top);
      const top = groundY - h;
      // window grid
      const wins = [];
      const cols = Math.max(2, Math.floor(w / 16));
      const rows = Math.max(3, Math.floor(h / 20));
      for (let r = 0; r < rows; r++) for (let cI = 0; cI < cols; cI++) {
        if (rng() > cfg.win) continue;
        const warm = rng() > 0.78;
        wins.push({ x: x + 7 + cI * (w - 14) / cols, y: top + 10 + r * (h - 16) / rows, warm });
      }
      blds.push({ x, w, top, h, wins });
      x += w + 2 + rng() * 14;
    }
    layers.push({ ...cfg, blds, groundY });
  }
}

// ---------------------------------------------------------------------------
// Rain
// ---------------------------------------------------------------------------
const drops = [];
function initRain() {
  drops.length = 0;
  const n = Math.floor((W * H) / 5200);
  for (let i = 0; i < n; i++) drops.push({ x: Math.random() * (W + 200) - 100, y: Math.random() * H, len: 8 + Math.random() * 16, sp: 9 + Math.random() * 9 });
}

// ---------------------------------------------------------------------------
// Input — tap (next line), drag (parallax), hold (lightning)
// ---------------------------------------------------------------------------
let parallax = 0, parTarget = 0;
let started = false, lineIdx = -1, lightning = 0, holdTimer = null;
let dragStartX = 0, dragLastX = 0, dragMoved = 0, downTime = 0;

function pointerDown(x) {
  if (!started) return;
  dragStartX = dragLastX = x; dragMoved = 0; downTime = performance.now();
  holdTimer = setTimeout(() => { lightning = 1.0; }, 380); // hold for a lightning strike
}
function pointerMove(x) {
  if (!started || downTime === 0) return;
  const dx = x - dragLastX; dragLastX = x; dragMoved += Math.abs(dx);
  parTarget = Math.max(-90, Math.min(90, parTarget + dx * 0.5));
  if (dragMoved > 12 && holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
}
function pointerUp() {
  if (!started) return;
  if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  const dur = performance.now() - downTime;
  if (dragMoved < 12 && dur < 360) nextLine(); // a clean tap
  downTime = 0;
}
cv.addEventListener('touchstart', e => { pointerDown(e.touches[0].clientX); }, { passive: true });
cv.addEventListener('touchmove', e => { pointerMove(e.touches[0].clientX); }, { passive: true });
cv.addEventListener('touchend', pointerUp, { passive: true });
cv.addEventListener('touchcancel', pointerUp, { passive: true });
cv.addEventListener('mousedown', e => pointerDown(e.clientX));
addEventListener('mousemove', e => pointerMove(e.clientX));
addEventListener('mouseup', pointerUp);

// ---------------------------------------------------------------------------
// Hard-boiled narration (original noir lines)
// ---------------------------------------------------------------------------
const LINES = [
  "The night is wet and the city drinks it down.",
  "She walked in like trouble — wearing a dress the colour of <b>fresh blood</b>.",
  "Rain on the glass. Blood in the gutter. Same difference in this town.",
  "<b>Basin City.</b> Everybody's got an angle. Everybody bleeds.",
  "I light a smoke and let the dark make the first move.",
  "Her heels click away into the rain and I know I'll follow.",
  "Neon hums a lullaby for the damned. <b>Red</b> as a warning.",
  "One more crooked street. One more reason to swing.",
  "The rain'll wash it clean by morning. It always lies.",
];
const capEl = document.getElementById('caption');
function nextLine() {
  lineIdx = (lineIdx + 1) % LINES.length;
  capEl.style.opacity = '0';
  setTimeout(() => { capEl.innerHTML = LINES[lineIdx]; capEl.style.opacity = '1'; }, 180);
}

// ---------------------------------------------------------------------------
// Figures
// ---------------------------------------------------------------------------
function drawTrenchMan(cx, groundY, scale, t) {
  // a broad silhouette in a fedora & trench coat, rim-lit by the streetlamp
  const s = scale;
  const sway = Math.sin(t * 1.1) * 1.5;
  ctx.save();
  ctx.translate(cx + sway, groundY);
  // shadow puddle reflection
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, 6 * s, 34 * s, 7 * s, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#000';
  // coat body (tapered trapezoid)
  ctx.beginPath();
  ctx.moveTo(-20 * s, 0);
  ctx.lineTo(-16 * s, -78 * s);
  ctx.lineTo(16 * s, -78 * s);
  ctx.lineTo(20 * s, 0);
  ctx.closePath(); ctx.fill();
  // shoulders
  ctx.beginPath();
  ctx.moveTo(-26 * s, -78 * s);
  ctx.quadraticCurveTo(0, -94 * s, 26 * s, -78 * s);
  ctx.lineTo(20 * s, -70 * s);
  ctx.quadraticCurveTo(0, -82 * s, -20 * s, -70 * s);
  ctx.closePath(); ctx.fill();
  // neck + head
  ctx.fillRect(-7 * s, -100 * s, 14 * s, 16 * s);
  ctx.beginPath(); ctx.arc(0, -106 * s, 11 * s, 0, Math.PI * 2); ctx.fill();
  // fedora: crown + wide brim
  ctx.beginPath();
  ctx.moveTo(-13 * s, -114 * s); ctx.lineTo(13 * s, -114 * s);
  ctx.lineTo(9 * s, -126 * s); ctx.lineTo(-9 * s, -126 * s); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, -114 * s, 22 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();

  // hard white rim light down the left edge (the lamp side)
  ctx.strokeStyle = 'rgba(235,238,245,0.85)';
  ctx.lineWidth = 2.2 * s;
  ctx.beginPath();
  ctx.moveTo(-20 * s, -2 * s);
  ctx.lineTo(-16 * s, -78 * s);
  ctx.moveTo(-25 * s, -78 * s);
  ctx.quadraticCurveTo(-14 * s, -90 * s, -7 * s, -96 * s);
  ctx.stroke();
  // glowing cigarette ember (selective red)
  const ember = 0.6 + 0.4 * Math.sin(t * 6);
  ctx.fillStyle = `rgba(255,40,20,${0.7 + 0.3 * ember})`;
  ctx.shadowColor = '#ff2010'; ctx.shadowBlur = 10 * ember;
  ctx.beginPath(); ctx.arc(12 * s, -100 * s, 1.8 * s, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawWomanInRed(cx, groundY, scale, t) {
  const s = scale;
  const walk = Math.sin(t * 2.2);
  ctx.save();
  ctx.translate(cx, groundY);
  // red reflection on wet street
  ctx.globalAlpha = 0.4;
  const grd = ctx.createLinearGradient(0, 0, 0, 40 * s);
  grd.addColorStop(0, 'rgba(200,0,20,0.5)'); grd.addColorStop(1, 'rgba(200,0,20,0)');
  ctx.fillStyle = grd; ctx.fillRect(-12 * s, 0, 24 * s, 44 * s);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#c8000f';
  ctx.shadowColor = 'rgba(200,0,20,0.55)'; ctx.shadowBlur = 16 * s;
  // dress (flared at the hem, swaying)
  ctx.beginPath();
  ctx.moveTo(-5 * s, -54 * s);
  ctx.lineTo(5 * s, -54 * s);
  ctx.lineTo(12 * s + walk * 2 * s, 0);
  ctx.quadraticCurveTo(0, 6 * s, -12 * s + walk * 2 * s, 0);
  ctx.closePath(); ctx.fill();
  // torso
  ctx.beginPath();
  ctx.moveTo(-5 * s, -54 * s);
  ctx.quadraticCurveTo(-7 * s, -64 * s, -4 * s, -70 * s);
  ctx.lineTo(4 * s, -70 * s);
  ctx.quadraticCurveTo(7 * s, -64 * s, 5 * s, -54 * s);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  // pale skin: head, shoulders, one leg (grayscale — survives as white)
  ctx.fillStyle = '#dcdcdc';
  ctx.beginPath(); ctx.arc(0, -78 * s, 6.5 * s, 0, Math.PI * 2); ctx.fill();   // head
  // dark hair
  ctx.fillStyle = '#050505';
  ctx.beginPath(); ctx.arc(0, -80 * s, 7 * s, Math.PI * 1.05, Math.PI * 2.1); ctx.fill();
  ctx.fillRect(-7 * s, -80 * s, 14 * s, 9 * s);
  ctx.restore();
}

function drawStreetlamp(x, groundY, scale, flick) {
  const s = scale, topY = groundY - 150 * s;
  // pole
  ctx.fillStyle = '#000';
  ctx.fillRect(x - 2 * s, topY, 4 * s, 150 * s);
  ctx.beginPath(); ctx.moveTo(x, topY); ctx.lineTo(x + 26 * s, topY - 4 * s); ctx.lineTo(x + 26 * s, topY + 3 * s); ctx.closePath(); ctx.fill();
  // lamp head
  const lx = x + 26 * s, ly = topY - 2 * s;
  // cone of light
  const g = ctx.createRadialGradient(lx, ly, 0, lx, ly + 110 * s, 150 * s);
  g.addColorStop(0, `rgba(255,250,225,${0.30 * flick})`);
  g.addColorStop(0.4, `rgba(230,235,255,${0.10 * flick})`);
  g.addColorStop(1, 'rgba(230,235,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.lineTo(lx - 70 * s, groundY);
  ctx.lineTo(lx + 70 * s, groundY);
  ctx.closePath(); ctx.fill();
  // bright bulb
  ctx.fillStyle = `rgba(255,250,230,${flick})`;
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 24 * flick;
  ctx.beginPath(); ctx.arc(lx, ly + 4 * s, 4 * s, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.moveTo(lx - 7 * s, ly - 6 * s); ctx.lineTo(lx + 7 * s, ly - 6 * s); ctx.lineTo(lx + 4 * s, ly + 2 * s); ctx.lineTo(lx - 4 * s, ly + 2 * s); ctx.closePath(); ctx.fill();
}

function drawNeon(x, y, w, h, color, label, t, seed) {
  const flick = (Math.sin(t * 9 + seed) > -0.7) ? (0.7 + 0.3 * Math.sin(t * 25 + seed)) : 0.15;
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = color; ctx.lineWidth = 3;
  ctx.shadowColor = color; ctx.shadowBlur = 18 * flick;
  ctx.globalAlpha = 0.35 + 0.65 * flick;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = color;
  ctx.font = `bold ${Math.floor(h * 0.5)}px "Courier New", monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.restore();
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

// ---------------------------------------------------------------------------
// Film grain + vignette (prebuilt once)
// ---------------------------------------------------------------------------
let grainCanvas;
function buildGrain() {
  grainCanvas = document.createElement('canvas');
  grainCanvas.width = grainCanvas.height = 220;
  const gx = grainCanvas.getContext('2d');
  const img = gx.createImageData(220, 220);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255;
    img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
    img.data[i + 3] = 255;
  }
  gx.putImageData(img, 0, 0);
}

// ---------------------------------------------------------------------------
// Main render
// ---------------------------------------------------------------------------
let last = performance.now(), nextBolt = 3 + Math.random() * 5;
function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 0.05); last = now;
  const t = now / 1000;
  parallax += (parTarget - parallax) * 0.08;

  // --- sky ---
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#04050a');
  sky.addColorStop(0.55, '#0a0c12');
  sky.addColorStop(1, '#16181f');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // moon
  const mx = W * 0.78 + parallax * 0.1, my = H * 0.2;
  const mg = ctx.createRadialGradient(mx, my, 0, mx, my, 90);
  mg.addColorStop(0, 'rgba(220,228,245,0.9)'); mg.addColorStop(0.3, 'rgba(180,190,210,0.5)'); mg.addColorStop(1, 'rgba(180,190,210,0)');
  ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, my, 90, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e8edf6'; ctx.beginPath(); ctx.arc(mx, my, 34, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0a0c12'; ctx.beginPath(); ctx.arc(mx + 14, my - 6, 30, 0, Math.PI * 2); ctx.fill(); // crescent bite

  // --- skyline layers ---
  for (const L of layers) {
    const ox = parallax * L.depth;
    ctx.fillStyle = L.shade;
    for (const b of L.blds) {
      ctx.fillRect(b.x + ox, b.top, b.w, b.h + 4);
    }
    // windows
    for (const b of L.blds) {
      for (const wn of b.wins) {
        ctx.fillStyle = wn.warm ? 'rgba(255,238,200,0.85)' : 'rgba(205,222,255,0.7)';
        ctx.fillRect(wn.x + ox, wn.y, 4, 5);
      }
    }
  }

  const groundY = H * 0.80;

  // --- neon signs on the near buildings (selective colour) ---
  drawNeon(W * 0.12 + parallax, groundY - 250, 92, 34, '#ff0018', 'BAR', t, 1.3);
  drawNeon(W * 0.66 + parallax, groundY - 320, 40, 120, '#ffd400', 'XXX', t, 4.1);
  drawNeon(W * 0.40 + parallax * 0.8, groundY - 300, 120, 30, '#ff0018', 'GIRLS', t, 2.7);

  // --- wet street ---
  const st = ctx.createLinearGradient(0, groundY, 0, H);
  st.addColorStop(0, '#0a0b0f'); st.addColorStop(1, '#020203');
  ctx.fillStyle = st; ctx.fillRect(0, groundY, W, H - groundY);
  // reflected glints
  ctx.globalAlpha = 0.10; ctx.fillStyle = '#aab4c8';
  for (let i = 0; i < 30; i++) {
    const rx = ((i * 137.5 + t * 6) % W);
    ctx.fillRect(rx, groundY + (i % 6) * (H - groundY) / 6, 2 + (i % 4), 2);
  }
  ctx.globalAlpha = 1;

  // lamp flicker
  const flick = (Math.sin(t * 30) > -0.9 ? 1 : 0.4) * (0.85 + 0.15 * Math.sin(t * 7));
  drawStreetlamp(W * 0.30, groundY, Math.min(W, H) / 380, flick);

  // --- the cast ---
  const figScale = Math.min(W, H) / 360;
  drawWomanInRed(W * 0.62 + parallax * 0.4, groundY, figScale * 0.8, t);   // walking away, mid-ground
  drawTrenchMan(W * 0.34 + parallax * 0.5, groundY + 4, figScale, t);       // foreground, under lamp

  // --- rain ---
  ctx.strokeStyle = 'rgba(180,190,210,0.35)'; ctx.lineWidth = 1.1;
  ctx.beginPath();
  for (const d of drops) {
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x - d.len * 0.35, d.y + d.len);
    d.y += d.sp * dt * 60; d.x -= d.sp * dt * 21;
    if (d.y > H) { d.y = -10; d.x = Math.random() * (W + 200) - 50; }
  }
  ctx.stroke();

  // --- lightning ---
  nextBolt -= dt;
  if (nextBolt <= 0) { lightning = Math.max(lightning, 0.9); nextBolt = 5 + Math.random() * 8; }
  if (lightning > 0) {
    ctx.fillStyle = `rgba(255,255,255,${lightning * 0.5})`;
    ctx.fillRect(0, 0, W, H);
    lightning -= dt * 3.0;
    if (lightning < 0) lightning = 0;
  }

  // --- film grain ---
  if (grainCanvas) {
    ctx.globalAlpha = 0.06;
    const gx = -Math.random() * 80, gy = -Math.random() * 80;
    for (let yy = gy; yy < H; yy += 220) for (let xx = gx; xx < W; xx += 220) ctx.drawImage(grainCanvas, xx, yy);
    ctx.globalAlpha = 1;
  }

  // --- vignette ---
  const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.7)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
resize();
initRain();
buildGrain();
addEventListener('resize', initRain);
requestAnimationFrame(frame);

document.getElementById('enter').addEventListener('click', () => {
  started = true;
  const intro = document.getElementById('intro');
  intro.style.opacity = '0';
  setTimeout(() => intro.style.display = 'none', 800);
  capEl.style.display = 'block';
  document.getElementById('tapnote').style.display = 'block';
  nextLine();
});
</script>
</body>
</html>
