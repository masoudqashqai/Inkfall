<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>INKFALL — a noir story engine</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { height: 100%; overflow: hidden; background: #000; font-family: "Courier New", monospace; }
  #c { position: fixed; inset: 0; display: block; touch-action: none; }
  #scenetag { position: fixed; top: max(14px, env(safe-area-inset-top)); left: 16px; z-index: 10;
    color: #d8d4c8; font-size: 12px; letter-spacing: 0.4em; font-weight: 700; text-shadow: 2px 2px 0 #000;
    opacity: 0; transition: opacity 0.5s ease; }
  #scenetag b { color: #c20012; }
  #caption { position: fixed; left: 50%; bottom: max(26px, env(safe-area-inset-bottom)); transform: translateX(-50%);
    z-index: 10; width: min(92vw, 640px); background: rgba(245,242,232,0.93); color: #111;
    border: 2px solid #000; box-shadow: 6px 6px 0 rgba(0,0,0,0.6); padding: 12px 16px;
    font-size: clamp(13px, 4vw, 18px); line-height: 1.45; letter-spacing: 0.02em; transition: opacity 0.35s ease; }
  #caption b { color: #c20012; font-weight: 700; }
  #tapnote { position: fixed; left: 50%; bottom: 5px; transform: translateX(-50%); z-index: 10;
    color: #6a6a6a; font-size: 10px; letter-spacing: 0.22em; }
  #intro { position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 24px;
    background: radial-gradient(circle at 50% 38%, #161616 0%, #000 72%); transition: opacity 0.8s ease; }
  #intro h1 { color: #fff; font-size: clamp(46px, 15vw, 130px); letter-spacing: 0.06em; font-weight: 900;
    transform: skewX(-7deg); text-shadow: 0 0 30px rgba(255,255,255,0.22); }
  #intro h1 .b { color: #e10010; text-shadow: 0 0 34px rgba(225,0,16,0.75); }
  #intro p { color: #9a9a9a; margin-top: 14px; font-size: clamp(11px, 3.4vw, 15px); letter-spacing: 0.22em; }
  #intro .sub { color: #5a5a5a; margin-top: 8px; font-size: clamp(10px, 2.7vw, 12px); letter-spacing: 0.1em;
    max-width: 470px; line-height: 1.7; }
  #enter { margin-top: 36px; padding: 15px 38px; cursor: pointer; background: transparent; color: #fff;
    border: 1px solid #fff; font-family: inherit; font-size: 15px; letter-spacing: 0.3em; font-weight: 700; transition: all 0.2s ease; }
  #enter:hover, #enter:active { background: #e10010; border-color: #e10010; box-shadow: 0 0 30px rgba(225,0,16,0.6); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scenetag"></div>
<div id="caption" style="display:none"></div>
<div id="tapnote" style="display:none">TAP — NEXT&nbsp; ·&nbsp; DRAG — LOOK&nbsp; ·&nbsp; HOLD — LIGHTNING</div>
<div id="intro">
  <h1>INK<span class="b">FALL</span></h1>
  <p id="introsub">A NOIR STORY ENGINE</p>
  <div class="sub" id="introblurb">Feed it a story. Get back a rain-soaked, black-and-white world where the only colour is the colour that bleeds.</div>
  <button id="enter">ENTER THE CITY</button>
</div>

<script>
"use strict";
/* =====================================================================================
   INKFALL — a small NOIR FRAMEWORK
   -------------------------------------------------------------------------------------
   The engine below knows nothing about any particular story. It only knows the *noir
   grammar*: a fixed palette (grayscale + the colours that bleed), declared LIGHT SOURCES,
   ANIMATION timing, RAIN / GRAIN / VIGNETTE / LIGHTNING, scene TRANSITIONS, and how to
   render NARRATION as comic captions.

   A story is just DATA (see `STORY` near the bottom): a list of scenes, each with a
   backdrop, some lights, a cast of actors at normalized positions, and a script of lines.
   Want a new beat? Add a line. A new scene? Add an object. No engine edits required.
   ===================================================================================== */

// ----- THE LOOK: one place that defines the whole art direction -----------------------
const PALETTE = {
  ink: '#020203', nearInk: '#050506', midInk: '#070809', farInk: '#0c0e13',
  paper: '#f5f2e8', bone: '#dcdcdc', steel: '#aab4c8',
  red: '#c8000f', redHot: '#ff0018', ember: '#ff2010', amber: '#ffd400',
  moon: '#e8edf6', skyTop: '#04050a', skyMid: '#0a0c12', skyLow: '#16181f',
  warmWin: 'rgba(255,236,196,0.9)', coolWin: 'rgba(202,220,255,0.72)',
};
const ANIM = {
  swaySpeed: 1.1, walkSpeed: 2.2, emberSpeed: 6, flickerSpeed: 9,
  rainAlpha: 0.35, grainAlpha: 0.06, vignette: 0.7, parallaxLerp: 0.08,
  transIn: 2.4, transOut: 1.8, boltGap: [5, 13],
};

const rand32 = a => () => { a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };

// =====================================================================================
//  ENGINE
// =====================================================================================
const Noir = {
  actors: {}, backdrops: {},
  registerActor(name, fn) { this.actors[name] = fn; },
  registerBackdrop(name, obj) { this.backdrops[name] = obj; },

  // runtime state
  cv: null, ctx: null, W: 0, H: 0, DPR: 1,
  palette: PALETTE, anim: ANIM,
  parallax: 0, parTarget: 0, t: 0, dt: 0, unit: 1, gy: 0, keyLight: { x: 0.3, y: 0.3 },
  flags: {},                 // per-scene event flags (muzzle, blood, ...)
  drops: [], grain: null,
  started: false, sceneIdx: 0, lineIdx: -1,
  lightning: 0, nextBolt: 4, transState: null, transAlpha: 0, pending: 0,

  init(story) {
    this.story = story;
    this.scenes = story.scenes;
    this.cv = document.getElementById('c');
    this.ctx = this.cv.getContext('2d', { alpha: false });
    this.capEl = document.getElementById('caption');
    this.tagEl = document.getElementById('scenetag');
    this.bindInput();
    addEventListener('resize', () => this.resize());
    this.resize();
    this.buildGrain();
    this.last = performance.now();
    requestAnimationFrame(n => this.frame(n));
  },

  resize() {
    this.DPR = Math.min(window.devicePixelRatio || 1, 2);
    this.W = innerWidth; this.H = innerHeight;
    this.cv.width = Math.floor(this.W * this.DPR); this.cv.height = Math.floor(this.H * this.DPR);
    this.cv.style.width = this.W + 'px'; this.cv.style.height = this.H + 'px';
    this.ctx.setTransform(this.DPR, 0, 0, this.DPR, 0, 0);
    // (re)build every backdrop's static geometry for the new size
    for (const sc of this.scenes) {
      const bd = this.backdrops[sc.backdrop.type];
      if (bd && bd.build) sc._bd = bd.build(this, sc);
    }
    this.initRain();
  },

  // ---- coordinate helpers actors use ----
  X(p) { return p.x * this.W + this.parallax * (p.par == null ? 0.5 : p.par); },
  scaleOf(p) { return this.unit * (p.scale || 1); },

  // ---- light sources: declared in the story, drawn here ----
  drawLights(scene) {
    const c = this.ctx;
    for (const L of (scene.lights || [])) {
      const x = L.x * this.W + this.parallax * (L.par == null ? 0.5 : L.par);
      const y = (L.y != null ? L.y : 0.5) * this.H;
      const flick = L.flicker ? (Math.sin(this.t * 30 + (L.seed || 0)) > -0.9 ? 1 : 0.4) * (0.85 + 0.15 * Math.sin(this.t * 7)) : 1;
      const intensity = (L.intensity || 1) * flick;
      if (L.type === 'lamp') this._lamp(x, this.gy, this.unit * (L.scale || 1), intensity);
      else if (L.type === 'neon') this._neon(x, y, L.w, L.h, L.color, L.label, L.seed || 0);
      else if (L.type === 'bulb') this._bulb(x, y, intensity);
      else if (L.type === 'glow') this._glow(x, y, L.r, L.color, intensity);
    }
  },
  _glow(x, y, r, color, a) { const c = this.ctx, g = c.createRadialGradient(x, y, 0, x, y, r); g.addColorStop(0, color.replace('ALPHA', 0.3 * a)); g.addColorStop(1, color.replace('ALPHA', 0)); c.fillStyle = g; c.beginPath(); c.arc(x, y, r, 0, 7); c.fill(); },
  _lamp(x, gy, s, fl) {
    const c = this.ctx, topY = gy - 150 * s; c.fillStyle = PALETTE.ink;
    c.fillRect(x - 2 * s, topY, 4 * s, 150 * s);
    c.beginPath(); c.moveTo(x, topY); c.lineTo(x + 26 * s, topY - 4 * s); c.lineTo(x + 26 * s, topY + 3 * s); c.closePath(); c.fill();
    const lx = x + 26 * s, ly = topY - 2 * s, g = c.createRadialGradient(lx, ly, 0, lx, ly + 110 * s, 150 * s);
    g.addColorStop(0, `rgba(255,250,225,${0.30 * fl})`); g.addColorStop(0.4, `rgba(230,235,255,${0.10 * fl})`); g.addColorStop(1, 'rgba(230,235,255,0)');
    c.fillStyle = g; c.beginPath(); c.moveTo(lx, ly); c.lineTo(lx - 70 * s, gy); c.lineTo(lx + 70 * s, gy); c.closePath(); c.fill();
    c.fillStyle = `rgba(255,250,230,${fl})`; c.shadowColor = '#fff'; c.shadowBlur = 24 * fl; c.beginPath(); c.arc(lx, ly + 4 * s, 4 * s, 0, 7); c.fill(); c.shadowBlur = 0;
    c.fillStyle = PALETTE.ink; c.beginPath(); c.moveTo(lx - 7 * s, ly - 6 * s); c.lineTo(lx + 7 * s, ly - 6 * s); c.lineTo(lx + 4 * s, ly + 2 * s); c.lineTo(lx - 4 * s, ly + 2 * s); c.closePath(); c.fill();
  },
  _neon(x, y, w, h, color, label, seed) {
    const c = this.ctx, fl = (Math.sin(this.t * 9 + seed) > -0.7) ? (0.7 + 0.3 * Math.sin(this.t * 25 + seed)) : 0.16;
    c.save(); c.strokeStyle = color; c.lineWidth = 3; c.shadowColor = color; c.shadowBlur = 18 * fl;
    c.globalAlpha = 0.35 + 0.65 * fl; c.strokeRect(x, y, w, h);
    c.fillStyle = color; c.font = `bold ${Math.floor(h * 0.5)}px "Courier New",monospace`; c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(label, x + w / 2, y + h / 2 + 1); c.restore(); c.shadowBlur = 0; c.globalAlpha = 1;
  },
  _bulb(x, y, fl) {
    const c = this.ctx; c.strokeStyle = PALETTE.ink; c.lineWidth = 1; c.beginPath(); c.moveTo(x, y - 95); c.lineTo(x, y); c.stroke();
    const g = c.createRadialGradient(x, y, 0, x, y, 120); g.addColorStop(0, `rgba(255,244,210,${0.22 * fl})`); g.addColorStop(1, 'rgba(255,244,210,0)');
    c.fillStyle = g; c.beginPath(); c.arc(x, y, 120, 0, 7); c.fill();
    c.fillStyle = `rgba(255,246,220,${fl})`; c.shadowColor = '#fff'; c.shadowBlur = 16; c.beginPath(); c.arc(x, y, 3.5, 0, 7); c.fill(); c.shadowBlur = 0;
  },

  // ---- shared wet floor (used by street/alley backdrops via env) ----
  wetFloor(reflect) {
    const c = this.ctx, g = this.gy;
    const st = c.createLinearGradient(0, g, 0, this.H); st.addColorStop(0, '#0a0b0f'); st.addColorStop(1, PALETTE.ink);
    c.fillStyle = st; c.fillRect(0, g, this.W, this.H - g);
    if (reflect) { c.save(); c.globalAlpha = 0.16; c.globalCompositeOperation = 'lighter'; for (const r of reflect) { c.fillStyle = r.color; const rx = r.x * this.W + this.parallax, wob = Math.sin(this.t * 3 + r.x * 10) * 4; c.fillRect(rx + wob, g + 4, 60, this.H - g); } c.restore(); c.globalAlpha = 1; }
    c.globalAlpha = 0.10; c.fillStyle = PALETTE.steel;
    for (let i = 0; i < 30; i++) { const rx = ((i * 137.5 + this.t * 6) % this.W); c.fillRect(rx, g + (i % 6) * (this.H - g) / 6, 2 + (i % 4), 2); }
    c.globalAlpha = 1;
  },

  // ---- the timeless overlays: rain, lightning, grain, vignette ----
  initRain() { this.drops.length = 0; const n = Math.floor((this.W * this.H) / 5200); for (let i = 0; i < n; i++) this.drops.push({ x: Math.random() * (this.W + 200) - 100, y: Math.random() * this.H, len: 8 + Math.random() * 16, sp: 9 + Math.random() * 9 }); },
  buildGrain() { const g = document.createElement('canvas'); g.width = g.height = 220; const gx = g.getContext('2d'), im = gx.createImageData(220, 220); for (let i = 0; i < im.data.length; i += 4) { const v = Math.random() * 255; im.data[i] = im.data[i + 1] = im.data[i + 2] = v; im.data[i + 3] = 255; } gx.putImageData(im, 0, 0); this.grain = g; },
  drawRain() { const c = this.ctx; c.strokeStyle = `rgba(180,190,210,${ANIM.rainAlpha})`; c.lineWidth = 1.1; c.beginPath(); for (const d of this.drops) { c.moveTo(d.x, d.y); c.lineTo(d.x - d.len * 0.35, d.y + d.len); d.y += d.sp * this.dt * 60; d.x -= d.sp * this.dt * 21; if (d.y > this.H) { d.y = -10; d.x = Math.random() * (this.W + 200) - 50; } } c.stroke(); },
  bolt(seed) {
    const c = this.ctx, rng = rand32(seed); let x = this.W * (0.2 + rng() * 0.6), y = 0;
    c.save(); c.strokeStyle = 'rgba(255,255,255,0.95)'; c.lineWidth = 2.5; c.shadowColor = '#cfe0ff'; c.shadowBlur = 18; c.lineCap = 'round'; c.beginPath(); c.moveTo(x, y);
    const segs = 9 + (rng() * 5 | 0);
    for (let i = 0; i < segs; i++) { x += (rng() - 0.5) * 70; y += this.H * 0.55 / segs; c.lineTo(x, y); if (rng() < 0.3) { c.moveTo(x, y); c.lineTo(x + (rng() - 0.5) * 60, y + 30 + rng() * 40); c.moveTo(x, y); } }
    c.stroke(); c.restore(); c.shadowBlur = 0;
  },
  drawSkyAndMoon(scene) {
    const c = this.ctx, sky = c.createLinearGradient(0, 0, 0, this.H);
    sky.addColorStop(0, PALETTE.skyTop); sky.addColorStop(0.55, PALETTE.skyMid); sky.addColorStop(1, PALETTE.skyLow);
    c.fillStyle = sky; c.fillRect(0, 0, this.W, this.H);
    c.fillStyle = 'rgba(200,210,230,0.5)';
    for (let i = 0; i < 40; i++) { const sx = (i * 197.3) % this.W, sy = (i * 91.7) % (this.H * 0.4); if ((i * 13) % 5 === 0) c.fillRect(sx, sy, 1.4, 1.4); }
    const m = scene.moon || { x: 0.78, y: 0.18 }, mx = m.x * this.W + this.parallax * 0.1, my = m.y * this.H;
    const mg = c.createRadialGradient(mx, my, 0, mx, my, 95); mg.addColorStop(0, 'rgba(220,228,245,0.9)'); mg.addColorStop(0.3, 'rgba(180,190,210,0.5)'); mg.addColorStop(1, 'rgba(180,190,210,0)');
    c.fillStyle = mg; c.beginPath(); c.arc(mx, my, 95, 0, 7); c.fill();
    c.fillStyle = PALETTE.moon; c.beginPath(); c.arc(mx, my, 34, 0, 7); c.fill();
    c.fillStyle = PALETTE.skyMid; c.beginPath(); c.arc(mx + 14, my - 6, 30, 0, 7); c.fill();
  },

  // ---- the per-frame render ----
  frame(now) {
    requestAnimationFrame(n => this.frame(n));
    this.dt = Math.min((now - this.last) / 1000, 0.05); this.last = now; this.t = now / 1000;
    this.parallax += (this.parTarget - this.parallax) * ANIM.parallaxLerp;
    this.unit = Math.min(this.W, this.H) / 360;
    if (this.flags.muzzle > 0) this.flags.muzzle = Math.max(0, this.flags.muzzle - this.dt * 2.2);

    const scene = this.scenes[this.sceneIdx];
    this.gy = (scene.ground || 0.8) * this.H;
    this.keyLight = scene.keyLight || { x: 0.3, y: 0.3 };

    this.drawSkyAndMoon(scene);
    const bd = this.backdrops[scene.backdrop.type];
    if (bd && bd.draw) bd.draw(this, scene);     // backdrop (may draw its own lights/floor)
    this.drawLights(scene);                       // declared light sources
    for (const p of (scene.cast || [])) { const fn = this.actors[p.actor]; if (fn) fn(this, p); }

    this.drawRain();
    this.nextBolt -= this.dt;
    if (this.nextBolt <= 0) { this.lightning = Math.max(this.lightning, 0.9); if (Math.random() < 0.7) this.bolt(now | 0); this.nextBolt = ANIM.boltGap[0] + Math.random() * (ANIM.boltGap[1] - ANIM.boltGap[0]); }
    if (this.lightning > 0) { this.ctx.fillStyle = `rgba(255,255,255,${this.lightning * 0.5})`; this.ctx.fillRect(0, 0, this.W, this.H); this.lightning = Math.max(0, this.lightning - this.dt * 3); }

    if (this.grain) { const c = this.ctx; c.globalAlpha = ANIM.grainAlpha; const gx = -Math.random() * 80, gy = -Math.random() * 80; for (let yy = gy; yy < this.H; yy += 220) for (let xx = gx; xx < this.W; xx += 220) c.drawImage(this.grain, xx, yy); c.globalAlpha = 1; }
    const vg = this.ctx.createRadialGradient(this.W / 2, this.H / 2, Math.min(this.W, this.H) * 0.3, this.W / 2, this.H / 2, Math.max(this.W, this.H) * 0.75);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, `rgba(0,0,0,${ANIM.vignette})`); this.ctx.fillStyle = vg; this.ctx.fillRect(0, 0, this.W, this.H);

    // scene transition (ink wipe)
    if (this.transState === 'in') { this.transAlpha += this.dt * ANIM.transIn; if (this.transAlpha >= 1) { this.transAlpha = 1; this.sceneIdx = this.pending; this.lineIdx = 0; this.flags = {}; this.showLine(); this.showTag(); this.transState = 'out'; } }
    else if (this.transState === 'out') { this.transAlpha -= this.dt * ANIM.transOut; if (this.transAlpha <= 0) { this.transAlpha = 0; this.transState = null; } }
    if (this.transAlpha > 0) { this.ctx.fillStyle = `rgba(0,0,0,${this.transAlpha})`; this.ctx.fillRect(0, 0, this.W, this.H); }
  },

  // ---- narration ----
  showLine() {
    const sc = this.scenes[this.sceneIdx], line = sc.script[this.lineIdx];
    this.capEl.style.opacity = '0';
    setTimeout(() => { this.capEl.innerHTML = line.text; this.capEl.style.opacity = '1'; }, 170);
    for (const fx of (line.fx || [])) {                 // story-driven events
      if (fx === 'muzzle') this.flags.muzzle = 1.0;
      else if (fx === 'blood') this.flags.blood = true;
      else if (fx === 'lightning') this.lightning = Math.max(this.lightning, 0.8);
    }
  },
  showTag() { this.tagEl.innerHTML = this.scenes[this.sceneIdx].title; this.tagEl.style.opacity = '0.85'; clearTimeout(this._tag); this._tag = setTimeout(() => this.tagEl.style.opacity = '0', 2600); },
  advance() { const sc = this.scenes[this.sceneIdx]; if (this.lineIdx < sc.script.length - 1) { this.lineIdx++; this.showLine(); } else if (!this.transState) { this.pending = (this.sceneIdx + 1) % this.scenes.length; this.transState = 'in'; } },
  start() { this.started = true; this.sceneIdx = 0; this.lineIdx = 0; this.flags = {}; this.showLine(); this.showTag(); },

  // ---- input: tap=advance, drag=parallax, hold=lightning ----
  bindInput() {
    let down = 0, lastX = 0, moved = 0, hold = null;
    const dn = x => { if (!this.started) return; lastX = x; moved = 0; down = performance.now(); hold = setTimeout(() => this.lightning = 1, 360); };
    const mv = x => { if (!this.started || !down) return; const dx = x - lastX; lastX = x; moved += Math.abs(dx); this.parTarget = Math.max(-100, Math.min(100, this.parTarget + dx * 0.5)); if (moved > 12 && hold) { clearTimeout(hold); hold = null; } };
    const up = () => { if (!this.started) return; if (hold) { clearTimeout(hold); hold = null; } if (moved < 12 && performance.now() - down < 360) this.advance(); down = 0; };
    this.cv.addEventListener('touchstart', e => dn(e.touches[0].clientX), { passive: true });
    this.cv.addEventListener('touchmove', e => mv(e.touches[0].clientX), { passive: true });
    this.cv.addEventListener('touchend', up, { passive: true }); this.cv.addEventListener('touchcancel', up, { passive: true });
    this.cv.addEventListener('mousedown', e => dn(e.clientX)); addEventListener('mousemove', e => mv(e.clientX)); addEventListener('mouseup', up);
  },
};

// =====================================================================================
//  ACTOR LIBRARY — reusable noir cast & props. Each: (env, p) using normalized p.x etc.
//  Add a new prop here once; from then on the story can just name it.
// =====================================================================================
Noir.registerActor('trenchMan', (e, p) => {
  const c = e.ctx, s = e.scaleOf(p), X = e.X(p), gy = e.gy + (p.dy || 0) * e.unit, t = e.t;
  const rim = (e.keyLight.x < p.x) ? -1 : 1; const sway = Math.sin(t * ANIM.swaySpeed) * 1.4;
  c.save(); c.translate(X + sway, gy);
  c.globalAlpha = 0.35; c.fillStyle = PALETTE.ink; c.beginPath(); c.ellipse(0, 6 * s, 34 * s, 7 * s, 0, 0, 7); c.fill(); c.globalAlpha = 1;
  c.fillStyle = PALETTE.ink;
  c.beginPath(); c.moveTo(-20 * s, 0); c.lineTo(-16 * s, -78 * s); c.lineTo(16 * s, -78 * s); c.lineTo(20 * s, 0); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(-26 * s, -78 * s); c.quadraticCurveTo(0, -94 * s, 26 * s, -78 * s); c.lineTo(20 * s, -70 * s); c.quadraticCurveTo(0, -82 * s, -20 * s, -70 * s); c.closePath(); c.fill();
  c.fillRect(-7 * s, -100 * s, 14 * s, 16 * s); c.beginPath(); c.arc(0, -106 * s, 11 * s, 0, 7); c.fill();
  c.beginPath(); c.moveTo(-13 * s, -114 * s); c.lineTo(13 * s, -114 * s); c.lineTo(9 * s, -126 * s); c.lineTo(-9 * s, -126 * s); c.closePath(); c.fill();
  c.beginPath(); c.ellipse(0, -114 * s, 22 * s, 5 * s, 0, 0, 7); c.fill();
  c.strokeStyle = 'rgba(235,238,245,0.85)'; c.lineWidth = 2.2 * s;

// =====================================================================================
//  BACKDROP LIBRARY — the "settings". build() precomputes geometry, draw() paints it.
// =====================================================================================
function buildSkyline(e, seed, cfgList, groundY) {
  const rng = rand32(seed), layers = [];
  for (const cfg of cfgList) {
    const blds = []; let x = -140;
    while (x < e.W + 220) {
      const w = cfg.minW + rng() * (cfg.maxW - cfg.minW), h = (cfg.minH + rng() * (cfg.maxH - cfg.minH)) * (groundY - cfg.top), top = groundY - h, wins = [];
      const cols = Math.max(2, w / 16 | 0), rows = Math.max(3, h / 20 | 0);
      for (let r = 0; r < rows; r++) for (let ci = 0; ci < cols; ci++) { if (rng() > cfg.win) continue; wins.push({ x: x + 7 + ci * (w - 14) / cols, y: top + 10 + r * (h - 16) / rows, warm: rng() > 0.8 }); }
      const cap = rng() < 0.25 ? { type: rng() < 0.5 ? 'tank' : 'ant', x: x + w * (0.3 + rng() * 0.4) } : null;
      blds.push({ x, w, top, h, wins, cap }); x += w + 2 + rng() * 16;
    }
    layers.push({ ...cfg, blds });
  }
  return layers;
}
function paintSkyline(e, layers, par) {
  const c = e.ctx;
  for (const L of layers) {
    const ox = par * L.depth; c.fillStyle = L.shade;
    for (const b of L.blds) { c.fillRect(b.x + ox, b.top, b.w, b.h + 6); if (b.cap) { if (b.cap.type === 'tank') { c.fillRect(b.cap.x + ox - 7, b.top - 14, 14, 14); c.fillRect(b.cap.x + ox - 9, b.top - 2, 18, 3); } else c.fillRect(b.cap.x + ox - 1, b.top - 22, 2, 22); } }
    for (const b of L.blds) for (const wn of b.wins) { c.fillStyle = wn.warm ? PALETTE.warmWin : PALETTE.coolWin; c.fillRect(wn.x + ox, wn.y, 4, 5); }
  }
}

Noir.registerBackdrop('skyline', {
  build(e, sc) { const layers = sc.backdrop.layers.map(l => ({ ...l, top: l.top * e.H })); return buildSkyline(e, sc.backdrop.seed, layers, (sc.ground || 0.8) * e.H); },
  draw(e, sc) { paintSkyline(e, sc._bd, e.parallax); e.wetFloor(sc.backdrop.reflect); },
});

Noir.registerBackdrop('alley', {

    c.beginPath(); c.moveTo(0, 0); c.lineTo(e.W * 0.4, 0); c.lineTo(vx - e.W * 0.1, vy); c.lineTo(vx - e.W * 0.1, g); c.lineTo(0, g); c.closePath(); c.fill();

    c.fillStyle = 'rgba(202,220,255,0.6)'; for (let i = 0; i < 6; i++) { c.fillRect(e.W * 0.06, e.H * 0.12 + i * 46, 16, 22); c.fillRect(e.W * 0.9, e.H * 0.12 + i * 46, 16, 22); }

function fireEscape(c, x, topY, h, w) {
  c.save(); c.strokeStyle = '#000'; c.fillStyle = '#000'; c.lineWidth = 2; const floors = h / 34 | 0;

  c.restore();
}
